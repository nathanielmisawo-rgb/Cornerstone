    <div class="row">
        <div class="content">
    <h1>Sign Up</h1>
 
    <form action="" method="post" id="signupForm" name="signupForm" class="authForm">

        <label for="fullname">Name:</label><br>
        <input type="text" id="fullname" name="fullname" maxlength="60" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" maxlength="60" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" maxlength="13" ><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="confirm_password">Confirm Password:</label><br>
        <input type="password" id="confirm_password" name="confirm_password" required><br><br>

        <input type="submit" value="Sign Up">
    </form>
